<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三重視聽倒數計時系統</title>
    <style>
        body {
            display: flex; flex-direction: column; height: 100vh; margin: 0;
            background-color: #383d42; color: white;
            font-family: '微軟正黑體', 'Arial', sans-serif;
            padding: 20px; overflow: hidden; position: relative; box-sizing: border-box;
        }

        /* 頂部資訊列 */
        .top-bar { display: flex; justify-content: space-between; align-items: flex-start; width: 100%; margin-bottom: 5px; z-index: 100005; position: relative; }
        .time-group { display: flex; flex-direction: column; }
        #top-date { font-size: 1.1em; color: #bbb; }
        #top-time { font-size: 1.8em; color: white; font-weight: bold; }
        .top-right-controls { display: flex; gap: 10px; margin-top: 5px; }
        .top-right-controls button { border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); color: white; }
        #alert-toggle-btn { background-color: #1abc9c; }
        #refresh-btn { background-color: #5480B2; }
        #fullscreen-btn { background-color: #34AA59; }

        /* 主要計時區 */
        .main-display { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1; margin-top: -30px; }
        #timer-main { font-size: 28vw; font-weight: 900; line-height: 0.9; }

        /* 課程卡片 */
        .course-cards-container { display: flex; justify-content: center; gap: 15px; margin-bottom: 65px; z-index: 2; }
        .course-card { background-color: #464a4f; padding: 12px 20px; border-radius: 10px; width: 45%; font-size: 1.25em; line-height: 1.4; }
        .card-title { border-bottom: 2px solid; margin-bottom: 8px; font-weight: bold; font-size: 1.1em; padding-bottom: 4px; }

        /* 提醒視窗 */
        #time-alert-box { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #e74c3c; color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 999999; }
        #close-alert-btn { position: absolute; top: 40px; right: 40px; background-color: rgba(255,255,255,0.2); border: 2px solid white; color: white; padding: 15px 30px; border-radius: 10px; font-size: 2em; cursor: pointer; font-weight: bold; }

        /* 動效 */
        .mode-preroll { color: #3498db !important; }
        .timer-flash-red { color: #e74c3c !important; animation: blink 0.5s infinite alternate; }
        @keyframes blink { from { opacity: 1; } to { opacity: 0.5; } }
        .flash-yellow { color: #f1c40f !important; }
        .flash-white { color: #ffffff !important; }

        .version-tag { position: fixed; left: 20px; bottom: 15px; font-size: 0.85em; color: #888; z-index: 100005; }
        .bottom-right-link { position: fixed; right: 20px; bottom: 15px; z-index: 100005; }
        .bottom-right-link a { color: #3498db; text-decoration: none; padding: 8px 12px; background-color: #282a2d; border-radius: 5px; font-weight: bold; font-size: 0.9em; }

        #password-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9); display: none; justify-content: center; align-items: center; z-index: 100010; }
        #password-modal-box { background-color: #464a4f; padding: 30px; border-radius: 10px; text-align: center; }
        #password-input { padding: 10px; margin: 15px 0; width: 220px; border-radius: 5px; border: none; font-size: 1.2em; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="time-group">
            <div id="top-date">日期載入中...</div>
            <div id="top-time">--:--:--</div>
        </div>
        <div class="top-right-controls">
            <button id="alert-toggle-btn" onclick="toggleAlerts()">自動提醒</button>
            <button id="refresh-btn" onclick="loadSchedule()">重新整理</button>
            <button id="fullscreen-btn" onclick="toggleFullScreen()">全螢幕</button>
        </div>
    </div>

    <div class="main-display">
        <div id="timer-main">00:00</div>
    </div>

    <div class="course-cards-container">
        <div class="course-card">
            <div class="card-title" style="color: #e74c3c; border-color: #e74c3c;">🔴 當前課程</div>
            <div>課程：<span id="curr-name">--</span></div>
            <div>講師：<span id="curr-speaker">--</span></div>
            <div>時間：<span id="curr-time">--:-- - --:-- (--Min)</span></div>
        </div>
        <div class="course-card">
            <div class="card-title" style="color: #3498db; border-color: #3498db;">▶️ 下堂課程</div>
            <div>課程：<span id="next-name">--</span></div>
            <div>講師：<span id="next-speaker">--</span></div>
            <div>時間：<span id="next-time">--:-- - --:-- (--Min)</span></div>
        </div>
    </div>

    <div class="version-tag" id="footer-info">載入中...</div>
    <div class="bottom-right-link"><a href="#" onclick="showPasswordModal(); return false;">⚙️ Sheet後台</a></div>

    <div id="time-alert-box">
        <button id="close-alert-btn" onclick="closeAlert()">關閉提醒 ✕</button>
        <div style="font-size: 10vw; font-weight: bold; margin-bottom: 20px;">提醒您</div>
        <div id="alert-content" style="font-size: 22vw; font-weight: 900;">時間到</div>
    </div>

    <div id="password-modal-overlay">
        <div id="password-modal-box">
            <h3>管理員驗證</h3>
            <input type="password" id="password-input" placeholder="請輸入密碼">
            <br>
            <button style="padding: 10px 20px; background: #34AA59; color: white; border: none; border-radius: 5px; cursor: pointer;" onclick="checkPassword()">確認</button>
            <button style="padding: 10px 20px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer;" onclick="hidePasswordModal()">取消</button>
        </div>
    </div>

    <script>
        // ★ 核心設定：您的 Google Apps Script 部署網址 ★
        const API_URL = "https://script.google.com/macros/s/AKfycbyVkpkIiltM-qHnlbB62QAIgwQr4m2DsqJ12mSIeIsk1YcLRk9DAtKXvAERS3pnWwQHDg/exec";
        const SPREADSHEET_URL = "https://docs.google.com/spreadsheets/d/1TGkgxqP1litJyu0U4VA0v2paDprZtCOQK5RtQ0QofWY/edit";
        const PASSWORD = "94800552";

        let remainingSeconds = 0;
        let isPreroll = false; 
        let countdownInterval, alertTimeout, alertFlashInterval;
        let lastTriggeredValue = null;
        let alertsEnabled = true;
        let updateStatus = "成功";

        function t2m(start, end) {
            if (!start || !end || start === "--") return 0;
            const [h1, m1] = start.split(':').map(Number);
            const [h2, m2] = end.split(':').map(Number);
            return (h2 * 60 + m2) - (h1 * 60 + m1);
        }

        // 修改後的讀取函式：使用 Fetch API
        function loadSchedule() {
            if (updateStatus !== "連線失敗") updateStatus = "讀取中...";
            updateFooterStatus();
            
            // 加上時間戳記避免瀏覽器快取
            fetch(`${API_URL}?t=${new Date().getTime()}`)
            .then(response => response.json())
            .then(data => {
                updateStatus = "成功";
                handleData(data);
                updateFooterStatus();
            })
            .catch(err => {
                console.error("Fetch Error:", err);
                updateStatus = "連線失敗";
                updateFooterStatus();
            });
        }

        function handleData(data) {
            // 清除現有計時
            clearInterval(countdownInterval);

            if (data && data.current) {
                document.getElementById('curr-name').textContent = data.current.name;
                document.getElementById('curr-speaker').textContent = data.current.speaker;
                const duration = t2m(data.current.start, data.current.end);
                document.getElementById('curr-time').textContent = `${data.current.start} - ${data.current.end} (${duration}Min)`;
                
                remainingSeconds = data.current.remainingSeconds;
                isPreroll = data.current.isPreroll || false;
                
                updateTimerDisplay();
                countdownInterval = setInterval(() => {
                    if (remainingSeconds > 0) { 
                        remainingSeconds--; 
                        updateTimerDisplay(); 
                    } else { 
                        loadSchedule(); 
                    }
                }, 1000);
            } else {
                // 無進行中也無預備中的課程
                document.getElementById('curr-name').textContent = "暫無課程";
                document.getElementById('curr-speaker').textContent = "--";
                document.getElementById('curr-time').textContent = "--:-- - --:--";
                document.getElementById('timer-main').textContent = "00:00";
                remainingSeconds = 0;
                isPreroll = false;
            }

            if (data && data.next) {
                document.getElementById('next-name').textContent = data.next.name;
                document.getElementById('next-speaker').textContent = data.next.speaker;
                const nextDuration = t2m(data.next.start, data.next.end);
                document.getElementById('next-time').textContent = `${data.next.start} - ${data.next.end} (${nextDuration}Min)`;
            } else {
                document.getElementById('next-name').textContent = "今日課程結束";
                document.getElementById('next-speaker').textContent = "--";
                document.getElementById('next-time').textContent = "--:-- - --:--";
            }
        }

        function updateTimerDisplay() {
            const m = Math.floor(remainingSeconds / 60);
            const s = remainingSeconds % 60;
            const timerEl = document.getElementById('timer-main');
            timerEl.textContent = m.toString().padStart(2, '0') + ":" + s.toString().padStart(2, '0');
            
            if (isPreroll) { 
                timerEl.className = 'mode-preroll'; 
            } else if (remainingSeconds < 60 && remainingSeconds > 0) { 
                timerEl.className = 'timer-flash-red'; 
            } else { 
                timerEl.className = ''; 
                timerEl.style.color = "white"; 
            }
            
            // 提醒觸發邏輯
            if (!isPreroll) {
                const pts = { 900:15, 300:5, 180:3, 60:1 };
                if (pts[remainingSeconds]) triggerTimeAlert('minutes', pts[remainingSeconds]);
                if (remainingSeconds === 0 && countdownInterval) {
                    triggerTimeAlert('end', '');
                }
            }
        }

        function triggerTimeAlert(type, value) {
            if (!alertsEnabled && type === 'minutes') return;
            if (type === 'minutes' && lastTriggeredValue === value) return;
            lastTriggeredValue = value;
            const box = document.getElementById('time-alert-box');
            const display = document.getElementById('alert-content');
            display.textContent = type === 'end' ? "時間到" : value + " 分鐘";
            box.style.display = 'flex';
            clearInterval(alertFlashInterval);
            let isYellow = true;
            alertFlashInterval = setInterval(() => { display.className = isYellow ? 'flash-yellow' : 'flash-white'; isYellow = !isYellow; }, 500);
            clearTimeout(alertTimeout);
            alertTimeout = setTimeout(closeAlert, type === 'end' ? 180000 : 10000);
        }

        function closeAlert() { document.getElementById('time-alert-box').style.display = 'none'; clearInterval(alertFlashInterval); }
        
        function updateClock() {
            const now = new Date();
            document.getElementById('top-date').textContent = now.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            document.getElementById('top-time').textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
        }
        
        function updateFooterStatus() {
            const isFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
            document.getElementById('footer-info').innerHTML = `三重視聽 Ver. 2026.02.27 | 自動提醒：${alertsEnabled ? '開啟' : '關閉'} | 數據更新：${updateStatus} | 全螢幕：${isFS ? '開啟' : '關閉'}`;
            document.getElementById('alert-toggle-btn').style.backgroundColor = alertsEnabled ? "#1abc9c" : "#7f8c8d";
        }
        
        function toggleAlerts() { alertsEnabled = !alertsEnabled; if(!alertsEnabled) closeAlert(); updateFooterStatus(); }
        
        function toggleFullScreen() {
            const elem = document.documentElement;
            if (!document.fullscreenElement) { 
                if (elem.requestFullscreen) elem.requestFullscreen(); 
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            } else { 
                if (document.exitFullscreen) document.exitFullscreen(); 
            }
        }
        
        function showPasswordModal() { document.getElementById('password-modal-overlay').style.display = 'flex'; }
        function hidePasswordModal() { document.getElementById('password-modal-overlay').style.display = 'none'; }
        
        function checkPassword() {
            if (document.getElementById('password-input').value === PASSWORD) { 
                window.open(SPREADSHEET_URL, '_blank'); 
                hidePasswordModal(); 
            } else { 
                alert("密碼錯誤！"); 
            }
        }

        window.onload = () => { 
            setInterval(updateClock, 1000); 
            loadSchedule(); 
            updateFooterStatus(); 
            // 每 30 秒自動同步數據
            setInterval(() => { if (updateStatus !== "讀取中") loadSchedule(); }, 30000); 
            document.addEventListener('fullscreenchange', updateFooterStatus);
            document.addEventListener('webkitfullscreenchange', updateFooterStatus);
        };
    </script>
</body>
</html>
