<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三重視聽計時系統</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #2b2d31; 
            --primary: #5865f2;
            --danger: #ed4245;  
            --success: #00c853;
            --warning: #ffab00;
            --info-blue: #3498db; 
        }
        body {
            margin: 0; padding: 25px; height: 100vh; box-sizing: border-box;
            background-color: var(--bg-color); color: #e0e0e0;
            font-family: 'Segoe UI', '微軟正黑體', sans-serif;
            display: flex; flex-direction: column; overflow: hidden;
        }

        .header { display: flex; justify-content: space-between; align-items: flex-start; flex-shrink: 0; }
        .clock-box { display: flex; flex-direction: column; }
        .hall-title { color: var(--primary); font-size: 1.5rem; font-weight: bold; margin-bottom: 5px; }
        #clock-hms { font-size: 3rem; font-weight: bold; font-variant-numeric: tabular-nums; line-height: 1; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        #clock-date { font-size: 1.2rem; color: #888; margin-top: 5px; }

        .top-right { display: flex; align-items: center; gap: 15px; flex-direction: column; align-items: flex-end; }
        
        .hall-select {
            background-color: #1e1f22; color: white; border: 1px solid #444;
            padding: 8px 15px; border-radius: 8px; font-size: 1.1rem; cursor: pointer;
            font-family: inherit; font-weight: bold; outline: none; transition: 0.2s;
        }
        .hall-select:hover { border-color: var(--primary); }

        .sync-tag { 
            background: #1e1f22; padding: 8px 15px; border-radius: 30px; 
            font-size: 0.9rem; display: flex; align-items: center; gap: 10px;
            border: 1px solid #333; transition: all 0.3s;
        }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--success); }
        .status-dot.loading { background: var(--warning); animation: pulse 1s infinite; }
        .status-dot.error { background: var(--danger); }
        #sync-countdown { color: #888; font-size: 0.85rem; margin-left: 2px; font-variant-numeric: tabular-nums; width: 25px; text-align: right; }

        /* 顯示目前抓取到的試算表設定，方便除錯 */
        #debug-msg {
            color: var(--warning);
            font-size: 0.95rem;
            margin-top: 5px;
            max-width: 350px;
            text-align: right;
            font-weight: bold;
        }

        /* 計時器主區塊 */
        .timer-wrap { 
            flex-grow: 1; display: flex; justify-content: center; align-items: center; 
            min-height: 0; 
        }
        #main-timer { 
            font-size: min(35vw, 55vh); 
            line-height: 0.9; 
            font-weight: 900; font-variant-numeric: tabular-nums;
            letter-spacing: -0.5vw; text-shadow: 0 0 50px rgba(0,0,0,0.8);
            transition: color 0.3s ease;
            cursor: pointer; 
        }

        /* 下方課堂資訊卡片 */
        .footer-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; 
            z-index: 2; flex-shrink: 0; 
            width: 100%; 
        }
        .card { 
            background: var(--card-bg); padding: 15px 20px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid #3a3c42;
            min-width: 0; display: flex; flex-direction: column;
        }
        
        .card-header {
            display: flex; align-items: center; gap: 8px;
            padding-bottom: 8px; margin-bottom: 12px;
            font-size: 1.15rem; font-weight: bold;
        }
        .current-header { border-bottom: 1px solid var(--danger); }
        .next-header { border-bottom: 1px solid var(--info-blue); }

        .icon-circle { width: 16px; height: 16px; border-radius: 50%; background: var(--danger); border: 1px solid #111; }
        .icon-square { 
            width: 16px; height: 16px; background: var(--info-blue); border: 1px solid #111; border-radius: 2px;
            display: flex; justify-content: center; align-items: center; color: white; font-size: 10px; 
        }

        .card-body {
            display: flex; flex-direction: column; gap: 8px;
            font-size: 1.15rem; color: #ddd;
        }
        .card-body div {
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
        }

        .text-red { color: var(--danger) !important; }
        .text-blue { color: var(--info-blue) !important; }
        .blink { animation: flash 1s step-end infinite; }
        @keyframes flash { 50% { opacity: 0.1; } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* 🌟 全螢幕紅色閃爍提醒 (版面重新配置) 🌟 */
        #alert-screen {
            position: fixed; top:0; left:0; width: 100%; height:100%;
            background: var(--danger); z-index: 9999; display: none;
            flex-direction: column; justify-content: center; align-items: center; color: white;
            animation: bg-pulse 1s infinite alternate;
            text-align: center;
        }
        /* 第一行：提醒您/你 */
        #alert-sub { 
            font-size: 4.5rem; 
            font-weight: bold; 
            margin: 0 0 15px 0; 
            letter-spacing: 5px;
            text-shadow: 0 5px 20px rgba(0,0,0,0.5); 
        }
        /* 第二行：加大加粗的時間狀態 */
        #alert-msg { 
            font-size: 13vw; /* 使用畫面寬度比例，字體超巨大 */
            margin: 0; 
            font-weight: 900; /* 最粗體 */
            text-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            line-height: 1.1; 
        }
        @keyframes bg-pulse { from { background: #ff4d4d; } to { background: #cc0000; } }

        /* 右下角版本與後台連結 */
        .bottom-right-info {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            font-size: 0.9rem;
            color: #888;
            margin-top: 10px;
            flex-shrink: 0;
        }
        .bottom-right-info a {
            color: var(--info-blue);
            text-decoration: none;
            padding: 5px 10px;
            background: #1e1f22;
            border-radius: 6px;
            border: 1px solid #333;
            transition: 0.2s;
            font-weight: bold;
        }
        .bottom-right-info a:hover {
            border-color: var(--info-blue);
            color: white;
            background: #2b2d31;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="clock-box">
            <div class="hall-title" id="display-hall-name">📍 講經堂</div>
            <div id="clock-hms">00:00:00</div>
            <div id="clock-date">載入中...</div>
        </div>
        <div class="top-right">
            <div style="display: flex; gap: 15px; align-items: center;">
                <select id="hall-selector" class="hall-select" onchange="changeHall()">
                    <option value="講經堂">📍 講經堂</option>
                    <option value="國議廳">📍 國議廳</option>
                    <option value="感恩堂">📍 感恩堂</option>
                </select>

                <div class="sync-tag" id="sync-container">
                    <div id="status-dot" class="status-dot"></div>
                    <span id="status-text">系統啟動中</span>
                    <span id="sync-countdown"></span>
                </div>
            </div>
            <div id="debug-msg">連線取得設定中...</div> 
        </div>
    </div>

    <div class="timer-wrap">
        <div id="main-timer" title="點擊這裡可以測試紅色閃爍提醒">--:--</div>
    </div>

    <div class="footer-grid">
        <div class="card">
            <div class="card-header current-header">
                <div class="icon-circle"></div>
                <span class="text-red">當前課程</span>
            </div>
            <div class="card-body">
                <div>課程：<span id="cur-name">--</span></div>
                <div>講師：<span id="cur-speaker">--</span></div>
                <div>時間：<span id="cur-time">--:-- - --:-- (--Min)</span></div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header next-header">
                <div class="icon-square">▶</div>
                <span class="text-blue">下堂課程</span>
            </div>
            <div class="card-body">
                <div>課程：<span id="next-name">--</span></div>
                <div>講師：<span id="next-speaker">--</span></div>
                <div>時間：<span id="next-time">--:-- - --:-- (--Min)</span></div>
            </div>
        </div>
    </div>

    <div class="bottom-right-info">
        <span>三重視聽 Ver. 2.7 (提醒優化版)</span>
        <a href="https://docs.google.com/spreadsheets/d/1ynJaZK2OXOChlMo0eQ2Y5ZTWD1EV0Xwm3_8oty6Rmd8/edit" target="_blank">⚙️ 後台連結</a>
    </div>

    <div id="alert-screen">
        <p id="alert-sub">提醒您</p>
        <h1 id="alert-msg">剩下 5 分鐘</h1>
    </div>

    <script>
        const API_BASE_URL = "https://script.google.com/macros/s/AKfycbwJUwQeV3ObeBNl0OjTrGj5KYS7Q5M4dXuHjzIeuii6_83EInwJwnncKlz7Ly5ojbMS/exec"; 

        let currentHall = "講經堂";
        let remainSeconds = 0;
        let isPreroll = false;
        let currentCourseName = "";
        
        let triggeredAlerts = new Set();
        let alertTimeout = null; 

        // 控制開關與閃爍秒數
        let courseAlertEn = false;
        let alertDisplayDuration = 5000; 
        
        let courseZeroEn = false;
        let zeroDisplayDuration = 5000;  

        let syncTimer = 5; 

        function initHall() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('hall')) currentHall = urlParams.get('hall');
            
            document.getElementById('hall-selector').value = currentHall;
            document.getElementById('display-hall-name').textContent = "📍 " + currentHall;
        }

        function changeHall() {
            const selected = document.getElementById('hall-selector').value;
            window.location.href = window.location.pathname + "?hall=" + encodeURIComponent(selected);
        }

        function tickClock() {
            const now = new Date();
            document.getElementById('clock-hms').textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
            document.getElementById('clock-date').textContent = now.toLocaleDateString('zh-TW', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }

        function calcDuration(start, end) {
            if(!start || !end || start === "--" || end === "--") return "--";
            try {
                let [h1, m1] = start.split(':').map(Number);
                let [h2, m2] = end.split(':').map(Number);
                let diff = (h2 * 60 + m2) - (h1 * 60 + m1);
                return diff > 0 ? diff : diff + 1440; 
            } catch(e) { return "--"; }
        }

        async function fetchSync() {
            updateSyncUI('loading', `正在同步...`);

            try {
                const fetchUrl = API_BASE_URL + "?hall=" + encodeURIComponent(currentHall);
                const response = await fetch(fetchUrl, { redirect: 'follow' });
                const rawText = await response.text();
                let data;
                
                try {
                    data = JSON.parse(rawText);
                } catch (parseErr) {
                    updateSyncUI('error', "資料格式異常");
                    return;
                }

                if (data.success) {
                    if (data.current) {
                        remainSeconds = Number(data.current.remainingSeconds) || 0;
                        if (isNaN(remainSeconds)) remainSeconds = 0;

                        isPreroll = data.current.isPreroll;
                        
                        courseAlertEn = !!data.current.alertEn;
                        let rawAlertVal = (data.current.alertVals && data.current.alertVals.length > 0) ? data.current.alertVals[0] : 0; 
                        alertDisplayDuration = (rawAlertVal > 0) ? rawAlertVal * 1000 : 5000;
                        
                        courseZeroEn = !!data.current.zeroEn;
                        let rawZeroVal = data.current.zeroVal || 0;
                        zeroDisplayDuration = (rawZeroVal > 0) ? rawZeroVal * 1000 : 5000;

                        let alertStatus = courseAlertEn ? `開(閃${alertDisplayDuration/1000}s)` : `關`;
                        let zeroStatus = courseZeroEn ? `開(閃${zeroDisplayDuration/1000}s)` : `關`;
                        document.getElementById('debug-msg').textContent = `倒數10/5/3: ${alertStatus} | 0分提醒: ${zeroStatus}`;

                        if (data.current.name !== currentCourseName) {
                            currentCourseName = data.current.name;
                            triggeredAlerts.clear(); 
                        }

                        document.getElementById('cur-name').textContent = data.current.name;
                        document.getElementById('cur-speaker').textContent = data.current.speaker || "--";
                        let duration = calcDuration(data.current.start, data.current.end);
                        document.getElementById('cur-time').textContent = `${data.current.start} - ${data.current.end} (${duration}Min)`;
                    } else {
                        remainSeconds = 0;
                        if (currentCourseName !== "") {
                            currentCourseName = "";
                            triggeredAlerts.clear();
                        }
                        isPreroll = false;

                        document.getElementById('cur-name').textContent = "--";
                        document.getElementById('cur-speaker').textContent = "--";
                        document.getElementById('cur-time').textContent = "--:-- - --:-- (--Min)";
                        document.getElementById('debug-msg').textContent = "目前無課程，不觸發提醒";
                    }

                    if (data.next) {
                        document.getElementById('next-name').textContent = data.next.name;
                        document.getElementById('next-speaker').textContent = data.next.speaker || "--";
                        let duration = calcDuration(data.next.start, data.next.end);
                        document.getElementById('next-time').textContent = `${data.next.start} - ${data.next.end} (${duration}Min)`;
                    } else {
                        document.getElementById('next-name').textContent = "--";
                        document.getElementById('next-speaker').textContent = "--";
                        document.getElementById('next-time').textContent = "--:-- - --:-- (--Min)";
                    }
                    
                    updateSyncUI('success', "雲端同步成功");
                    updateTimerDisplay();
                    checkAlertTrigger();
                } else {
                    updateSyncUI('error', "無法讀取排程");
                }
            } catch (err) {
                console.error("Fetch API 同步失敗:", err);
                updateSyncUI('error', "網路連線異常");
            }
        }

        function formatTimeText(totalSeconds) {
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            if (m > 0 && s > 0) return `${m}分${s}秒`;
            if (m > 0) return `${m} 分鐘`;
            return `${s} 秒`;
        }

        function checkAlertTrigger() {
            if (isPreroll || currentCourseName === "") return;

            // 1. 時間到提醒：固定 0 分 0 秒觸發
            if (courseZeroEn) {
                if (remainSeconds === 0 && !triggeredAlerts.has('ZERO')) {
                    triggeredAlerts.add('ZERO');
                    // 🌟 修改文案：第一行「提醒你」，第二行「時間到」
                    showAlert("時間到", "提醒您", zeroDisplayDuration);
                }
            } 
            
            // 2. 倒數提醒：固定 10分(600), 5分(300), 3分(180) 觸發
            if (courseAlertEn && remainSeconds > 0) {
                const fixedTargets = [600, 300, 180]; 
                
                for (let targetSeconds of fixedTargets) {
                    if (remainSeconds <= targetSeconds && remainSeconds > targetSeconds - 5) {
                        if (!triggeredAlerts.has(`ALERT_${targetSeconds}`)) {
                            triggeredAlerts.add(`ALERT_${targetSeconds}`);
                            // 🌟 修改文案：第一行「提醒您」，第二行「剩下 X 分/秒」
                            showAlert("剩下 " + formatTimeText(targetSeconds), "提醒您", alertDisplayDuration);
                        }
                    }
                }
            }
        }

        function updateTimerDisplay() {
            if (isNaN(remainSeconds)) remainSeconds = 0;

            const m = Math.floor(remainSeconds / 60);
            const s = remainSeconds % 60;
            const timerEl = document.getElementById('main-timer');
            
            if (currentCourseName === "") {
                timerEl.textContent = "00:00";
                timerEl.className = "";
                timerEl.style.color = "#444"; 
                return;
            }

            timerEl.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            timerEl.className = ""; 
            timerEl.style.color = ""; 

            if (isPreroll) {
                timerEl.classList.add('text-blue');
            } else if (remainSeconds > 0 && remainSeconds <= 60) {
                timerEl.classList.add('text-red', 'blink');
            }
        }

        // 修改 showAlert 傳入參數：msg 變成第二行超大字體，subText 變成第一行副標題
        function showAlert(msg, subText, durationMs = 5000) {
            const screen = document.getElementById('alert-screen');
            // 注意！HTML 已經反轉，alert-msg 對應到超大標題(h1)，alert-sub 對應到上方文字(p)
            document.getElementById('alert-msg').textContent = msg;
            document.getElementById('alert-sub').textContent = subText;
            screen.style.display = 'flex';
            
            if (alertTimeout) clearTimeout(alertTimeout);
            
            alertTimeout = setTimeout(() => { 
                screen.style.display = 'none'; 
            }, durationMs);
        }

        function updateSyncUI(status, text) {
            const dot = document.getElementById('status-dot');
            document.getElementById('status-text').textContent = text;
            
            dot.className = "status-dot"; 
            if (status === 'loading') dot.classList.add('loading');
            if (status === 'error') dot.classList.add('error');
        }

        window.onload = () => {
            initHall(); 
            setInterval(tickClock, 1000);
            
            setInterval(() => {
                if (remainSeconds > 0) {
                    remainSeconds--;
                }
                
                updateTimerDisplay();
                checkAlertTrigger(); 

                syncTimer--;
                document.getElementById('sync-countdown').textContent = `(${syncTimer}s)`;
                if (syncTimer <= 0) {
                    syncTimer = 5; 
                    fetchSync();
                }
            }, 1000);

            fetchSync();
            document.getElementById('sync-countdown').textContent = `(${syncTimer}s)`;

            document.body.ondblclick = (e) => {
                if (e.target.tagName.toLowerCase() === 'select' || e.target.tagName.toLowerCase() === 'option') return;
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            };

            // 點擊中間數字測試「紅色閃爍提醒」
            document.getElementById('main-timer').onclick = () => {
                showAlert("剩下 10 分鐘", "提醒您", 3000);
            };
        };
    </script>
</body>
</html>
