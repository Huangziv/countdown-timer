<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三重視聽計時系統</title>
    <style>
        :root {
            --bg-color: #121212;
            --primary: #5865f2;
            --danger: #ff4d4d;
            --success: #00c853;
            --warning: #ffab00;
        }
        body {
            margin: 0; padding: 25px; height: 100vh; box-sizing: border-box;
            background-color: var(--bg-color); color: #e0e0e0;
            font-family: 'Segoe UI', '微軟正黑體', sans-serif;
            display: flex; flex-direction: column; overflow: hidden;
        }

        .header { display: flex; justify-content: space-between; align-items: flex-start; }
        .clock-box { display: flex; flex-direction: column; }
        .hall-title { color: var(--primary); font-size: 1.5rem; font-weight: bold; margin-bottom: 5px; }
        #clock-hms { font-size: 3rem; font-weight: bold; font-variant-numeric: tabular-nums; line-height: 1; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        #clock-date { font-size: 1.2rem; color: #888; margin-top: 5px; }

        .top-right { display: flex; align-items: center; gap: 15px; }
        
        .hall-select {
            background-color: #2b2d31; color: white; border: 1px solid #444;
            padding: 8px 15px; border-radius: 8px; font-size: 1.1rem; cursor: pointer;
            font-family: inherit; font-weight: bold; outline: none; transition: 0.2s;
        }
        .hall-select:hover { border-color: var(--primary); }

        .sync-tag { 
            background: #252525; padding: 8px 15px; border-radius: 30px; 
            font-size: 0.9rem; display: flex; align-items: center; gap: 10px;
            border: 1px solid #333; transition: all 0.3s;
        }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--success); }
        .status-dot.loading { background: var(--warning); animation: pulse 1s infinite; }
        .status-dot.error { background: var(--danger); }

        .timer-wrap { flex-grow: 1; display: flex; justify-content: center; align-items: center; }
        #main-timer { 
            font-size: 33vw; font-weight: 900; font-variant-numeric: tabular-nums;
            letter-spacing: -1vw; text-shadow: 0 0 50px rgba(0,0,0,0.8);
            transition: color 0.3s ease;
        }

        .text-red { color: var(--danger) !important; }
        .text-blue { color: #4dabf7 !important; }
        .blink { animation: flash 1s step-end infinite; }
        @keyframes flash { 50% { opacity: 0.1; } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        #alert-screen {
            position: fixed; top:0; left:0; width: 100%; height:100%;
            background: var(--danger); z-index: 9999; display: none;
            flex-direction: column; justify-content: center; align-items: center; color: white;
            animation: bg-pulse 1s infinite alternate;
        }
        #alert-screen h1 { font-size: 18vw; margin: 0; text-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        @keyframes bg-pulse { from { background: #ff4d4d; } to { background: #cc0000; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="clock-box">
            <div class="hall-title" id="display-hall-name">📍 講經堂</div>
            <div id="clock-hms">00:00:00</div>
            <div id="clock-date">載入中...</div>
        </div>
        <div class="top-right">
            <select id="hall-selector" class="hall-select" onchange="changeHall()">
                <option value="講經堂">📍 講經堂</option>
                <option value="國議廳">📍 國議廳</option>
                <option value="感恩堂">📍 感恩堂</option>
            </select>

            <div class="sync-tag" id="sync-container">
                <div id="status-dot" class="status-dot"></div>
                <span id="status-text">系統啟動中</span>
            </div>
        </div>
    </div>

    <div class="timer-wrap">
        <div id="main-timer">--:--</div>
    </div>

    <div id="alert-screen">
        <h1 id="alert-msg">05:00</h1>
        <p id="alert-sub" style="font-size: 3.5rem; font-weight: bold; margin-top: -20px;">時間提醒</p>
    </div>

    <script>
        // =========================================================
        // ⚠️ 部署設定 ⚠️
        // 請將發布的 Google Apps Script 網頁應用程式 URL 貼在這裡
        // =========================================================
        const API_BASE_URL = "請在此貼上您的_GAS_網頁應用程式_URL"; 

        let currentHall = "講經堂";
        let remainSeconds = 0;
        let isPreroll = false;
        let currentCourseName = "";
        let lastAlertTrigger = -1;

        let alertTimes = []; // 改為儲存各個目標秒數
        let enableZeroAlert = false;
        let alertAtZeroTime = 0;
        let alertsEnabled = false;

        function initHall() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('hall')) currentHall = urlParams.get('hall');
            
            document.getElementById('hall-selector').value = currentHall;
            document.getElementById('display-hall-name').textContent = "📍 " + currentHall;
        }

        function changeHall() {
            const selected = document.getElementById('hall-selector').value;
            window.location.href = window.location.pathname + "?hall=" + encodeURIComponent(selected);
        }

        function tickClock() {
            const now = new Date();
            document.getElementById('clock-hms').textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
            document.getElementById('clock-date').textContent = now.toLocaleDateString('zh-TW', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
        }

        async function fetchSync() {
            if (!API_BASE_URL || API_BASE_URL.includes("在此貼上")) {
                updateSyncUI('error', "未設定後端 API"); return;
            }

            updateSyncUI('loading', `正在同步資料...`);

            try {
                const fetchUrl = API_BASE_URL + "?hall=" + encodeURIComponent(currentHall);
                const response = await fetch(fetchUrl, { redirect: 'follow' });
                const data = await response.json();

                if (data.success) {
                    if (data.settings) {
                        alertsEnabled = data.settings.ENABLE_ALERTS;
                        alertTimes = data.settings.ALERT_TIMES || [300, 180, 60];
                        enableZeroAlert = data.settings.ENABLE_ZERO_ALERT;
                        alertAtZeroTime = data.settings.ALERT_AT_ZERO_TIME !== undefined ? data.settings.ALERT_AT_ZERO_TIME : 0;
                    }

                    if (data.current) {
                        remainSeconds = data.current.remain;
                        isPreroll = data.current.isPreroll;

                        if (data.current.name !== currentCourseName) {
                            currentCourseName = data.current.name;
                            lastAlertTrigger = -1; 
                        }
                    } else {
                        remainSeconds = 0;
                        currentCourseName = "";
                        lastAlertTrigger = -1;
                        isPreroll = false;
                    }
                    
                    updateSyncUI('success', "雲端同步成功");
                    updateTimerDisplay();
                } else {
                    updateSyncUI('error', data.error || "資料異常");
                }
            } catch (err) {
                console.error("同步失敗:", err);
                updateSyncUI('error', "網路連線異常");
            }
        }

        // 將秒數轉換為易讀的文字 (如 3分30秒, 45秒)
        function formatTimeText(totalSeconds) {
            const m = Math.floor(totalSeconds / 60);
            const s = totalSeconds % 60;
            if (m > 0 && s > 0) return `${m}分${s}秒`;
            if (m > 0) return `${m} 分鐘`;
            return `${s} 秒`;
        }

        function checkAlertTrigger() {
            if (!alertsEnabled || isPreroll) return;

            // 檢查結束提醒 (可能為0，或是自訂的提早結束秒數)
            if (enableZeroAlert && remainSeconds === alertAtZeroTime && lastAlertTrigger !== 'ZERO') {
                if (currentCourseName !== "") {
                    const msg = alertAtZeroTime === 0 ? "00:00" : formatTimeText(alertAtZeroTime);
                    const subText = alertAtZeroTime === 0 ? "時間到！請結束演講" : "即將結束！請準備";
                    showAlert(msg, subText);
                    lastAlertTrigger = 'ZERO';
                }
            } 
            // 檢查自訂倒數提醒 (分秒)
            else if (remainSeconds > 0) {
                for (let targetSeconds of alertTimes) {
                    // 避免倒數提醒跟結束提醒時間一樣時，跳兩次視窗
                    if (enableZeroAlert && targetSeconds === alertAtZeroTime) continue;

                    // 給予2秒容錯緩衝
                    if (remainSeconds <= targetSeconds && remainSeconds >= targetSeconds - 2) {
                        if (lastAlertTrigger !== targetSeconds) {
                            showAlert(formatTimeText(targetSeconds), "倒數提醒");
                            lastAlertTrigger = targetSeconds;
                        }
                    }
                }
            }
        }

        function updateTimerDisplay() {
            const m = Math.floor(remainSeconds / 60);
            const s = remainSeconds % 60;
            const timerEl = document.getElementById('main-timer');
            
            timerEl.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            timerEl.className = ""; 

            if (isPreroll) {
                timerEl.classList.add('text-blue');
            } else if (remainSeconds > 0 && remainSeconds <= 60) {
                timerEl.classList.add('text-red', 'blink');
            }
        }

        function showAlert(msg, subText = "時間提醒") {
            const screen = document.getElementById('alert-screen');
            document.getElementById('alert-msg').textContent = msg;
            document.getElementById('alert-sub').textContent = subText;
            screen.style.display = 'flex';
            setTimeout(() => { screen.style.display = 'none'; }, 6000);
        }

        function updateSyncUI(status, text) {
            const dot = document.getElementById('status-dot');
            document.getElementById('status-text').textContent = text;
            dot.className = "status-dot"; 
            if (status === 'loading') dot.classList.add('loading');
            if (status === 'error') dot.classList.add('error');
        }

        window.onload = () => {
            initHall(); 
            setInterval(tickClock, 1000);
            
            setInterval(() => {
                if (remainSeconds > 0) {
                    remainSeconds--;
                    updateTimerDisplay();
                    checkAlertTrigger();
                } else if (remainSeconds === 0) {
                    checkAlertTrigger(); 
                }
            }, 1000);

            fetchSync();
            setInterval(fetchSync, 15000);

            document.body.ondblclick = (e) => {
                if (e.target.tagName.toLowerCase() === 'select' || e.target.tagName.toLowerCase() === 'option') return;
                if (!document.fullscreenElement) document.documentElement.requestFullscreen();
                else document.exitFullscreen();
            };
        };
    </script>
</body>
</html>
